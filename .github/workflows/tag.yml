name: Tag Release
on:
  push:
    branches:
      - main
jobs:
  tag:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get version from version.json
        run: echo "VERSION=$(jq -r .version ./version.json)" >> $GITHUB_ENV
      - name: Set Git Config
        run: |
          git config --global user.name "GitHub Robot"
          git config --global user.email "bot@dev.null"
      - name: Create Tag & Release
        run: |
          bash ${{ github.workspace }}/bin/create_release.sh --version $VERSION
      - name: Sync dev branch with main
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN || github.token }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/jazzsequence/jazzsequence.com.git
          git fetch origin

          # If main is already an ancestor of dev, nothing to do.
          if git merge-base --is-ancestor origin/main origin/dev; then
            echo "dev is already up-to-date with main, nothing to do."
            exit 0
          fi

          # Create a temporary branch from main and open a PR into dev.
          # Force-pushing dev directly is blocked by branch protection.
          SYNC_BRANCH="chore/sync-dev-after-${VERSION}"
          git checkout -b "$SYNC_BRANCH" origin/main
          git push origin "$SYNC_BRANCH"

          gh pr create \
            --base dev \
            --head "$SYNC_BRANCH" \
            --title "chore: sync dev with main after release $VERSION" \
            --body "Automated sync of dev branch with main following release $VERSION."

          gh pr merge "$SYNC_BRANCH" --merge --delete-branch --yes
          echo "dev branch synced with main after release $VERSION."
