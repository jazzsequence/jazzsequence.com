name: PHPUnit — jazzsequence-mcp-abilities

on:
  push:
    paths:
      - 'wp-content/plugins/jazzsequence-mcp-abilities/**'
  pull_request:
    paths:
      - 'wp-content/plugins/jazzsequence-mcp-abilities/**'

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      # WordPress core is installed via composer into the repo root.
      WP_CORE_DIR: ${{ github.workspace }}
      PLUGIN_DIR: wp-content/plugins/jazzsequence-mcp-abilities
      WP_VERSION: '6.7'

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, pdo_mysql
          coverage: none

      - name: Cache root Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-root-${{ hashFiles('composer.lock') }}
          restore-keys: composer-root-

      - name: Install root Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Cache plugin Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.PLUGIN_DIR }}/vendor
          key: composer-plugin-${{ hashFiles(format('{0}/composer.lock', env.PLUGIN_DIR)) }}
          restore-keys: composer-plugin-

      - name: Install plugin Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: ${{ env.PLUGIN_DIR }}

      - name: Install WordPress test library
        run: |
          mkdir -p "$WP_TESTS_DIR"
          svn export --quiet \
            "https://develop.svn.wordpress.org/tags/${WP_VERSION}/tests/phpunit/includes/" \
            "$WP_TESTS_DIR/includes"
          svn export --quiet \
            "https://develop.svn.wordpress.org/tags/${WP_VERSION}/tests/phpunit/data/" \
            "$WP_TESTS_DIR/data"

      - name: Configure WordPress test suite
        run: |
          cat > "$WP_TESTS_DIR/wp-tests-config.php" <<EOF
          <?php
          define( 'DB_NAME', 'wordpress_test' );
          define( 'DB_USER', 'root' );
          define( 'DB_PASSWORD', 'root' );
          define( 'DB_HOST', '127.0.0.1' );
          define( 'DB_CHARSET', 'utf8' );
          define( 'DB_COLLATE', '' );
          \$table_prefix = 'wptests_';
          define( 'WP_DEBUG', true );
          define( 'WP_TESTS_DOMAIN', 'example.org' );
          define( 'WP_TESTS_EMAIL', 'admin@example.org' );
          define( 'WP_TESTS_TITLE', 'Test Blog' );
          define( 'WP_PHP_BINARY', 'php' );
          define( 'WPLANG', '' );
          define( 'ABSPATH', '${{ github.workspace }}/' );
          EOF

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox
        working-directory: ${{ env.PLUGIN_DIR }}
