name: PHPUnit — jazzsequence-mcp-abilities

on:
  pull_request:
    paths:
      - 'wp-content/plugins/jazzsequence-mcp-abilities/**'

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      WP_CORE_DIR: /tmp/wordpress
      PLUGIN_DIR: wp-content/plugins/jazzsequence-mcp-abilities

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mysqli, pdo_mysql
          coverage: none
          tools: wp-cli

      - name: Cache plugin Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.PLUGIN_DIR }}/vendor
          key: composer-plugin-${{ hashFiles(format('{0}/composer.lock', env.PLUGIN_DIR)) }}
          restore-keys: composer-plugin-

      - name: Install plugin Composer dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: ${{ env.PLUGIN_DIR }}

      - name: Download latest stable WordPress
        run: |
          mkdir -p "$WP_CORE_DIR"
          wp core download --path="$WP_CORE_DIR" --version=latest --allow-root
          WP_VERSION=$(wp core version --path="$WP_CORE_DIR" --allow-root)
          WP_BRANCH=$(echo "$WP_VERSION" | cut -d. -f1,2)
          echo "WP_VERSION=$WP_VERSION" >> "$GITHUB_ENV"
          echo "WP_BRANCH=$WP_BRANCH" >> "$GITHUB_ENV"
          echo "Installed WordPress $WP_VERSION (branch: $WP_BRANCH)"

      - name: Install WordPress test library
        run: |
          mkdir -p "$WP_TESTS_DIR"
          git clone --depth=1 --branch "$WP_BRANCH" --filter=blob:none --sparse \
            https://github.com/WordPress/wordpress-develop.git \
            /tmp/wordpress-develop
          cd /tmp/wordpress-develop
          git sparse-checkout set tests/phpunit/includes tests/phpunit/data
          cp -r tests/phpunit/includes "$WP_TESTS_DIR/includes"
          cp -r tests/phpunit/data "$WP_TESTS_DIR/data"

      - name: Configure WordPress test suite
        run: |
          cat > "$WP_TESTS_DIR/wp-tests-config.php" <<EOF
          <?php
          define( 'DB_NAME', 'wordpress_test' );
          define( 'DB_USER', 'root' );
          define( 'DB_PASSWORD', 'root' );
          define( 'DB_HOST', '127.0.0.1' );
          define( 'DB_CHARSET', 'utf8' );
          define( 'DB_COLLATE', '' );
          \$table_prefix = 'wptests_';
          define( 'WP_DEBUG', true );
          define( 'WP_TESTS_DOMAIN', 'example.org' );
          define( 'WP_TESTS_EMAIL', 'admin@example.org' );
          define( 'WP_TESTS_TITLE', 'Test Blog' );
          define( 'WP_PHP_BINARY', 'php' );
          define( 'WPLANG', '' );
          define( 'ABSPATH', '/tmp/wordpress/' );
          EOF

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox
        working-directory: ${{ env.PLUGIN_DIR }}
